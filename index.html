// ════════════════════════════════════════════════════
// Item list search
// Ephemeral UI state only — never saved to file, never part of undo history.
// Tokens split on whitespace; each token is either a dimension filter
// (W/L/H followed by a number, e.g. "W20") or a name substring filter.
// All tokens must match (AND) for an item to be shown.
// ════════════════════════════════════════════════════
let searchQuery = '';
const DIM_TOKEN_RE = /^([wlh])(\d+(?:\.\d+)?)$/i;
const DIM_EPSILON = 0.01;

function getSearchTokens() {
  return searchQuery.trim().toLowerCase().split(/\s+/).filter(Boolean);
}

function itemMatchesSearch(item, tokens) {
  if (!tokens.length) return true;
  const name = getItemName(item).toLowerCase();
  for (const token of tokens) {
    const dimMatch = token.match(DIM_TOKEN_RE);
    if (dimMatch) {
      const axis = dimMatch[1].toLowerCase();
      const rawVal = parseFloat(dimMatch[2]);
      const val = metricMode ? cmToIn(rawVal) : rawVal; // interpret token in the active unit
      const itemVal = axis === 'w' ? item.w_in : axis === 'l' ? item.l_in : item.h_in;
      if (Math.abs(itemVal - val) > DIM_EPSILON) return false;
    } else if (!name.includes(token)) {
      return false;
    }
  }
  return true;
}

itemSearchEl.addEventListener('input', () => {
  searchQuery = itemSearchEl.value;
  renderItemList();
});
itemSearchClearEl.addEventListener('click', () => {
  searchQuery = '';
  itemSearchEl.value = '';
  itemSearchEl.focus();
  renderItemList();
});

// ════════════════════════════════════════════════════
// Item list panel
// ════════════════════════════════════════════════════
// ════════════════════════════════════════════════════
// Drag a planned item out of the list to commit it into the room
// ════════════════════════════════════════════════════
const DRAG_ROW_THRESHOLD = 6; // px of movement before a touch/click on a row counts as a drag
const dragGhostEl = document.createElement('div');
dragGhostEl.className = 'drag-ghost';
dragGhostEl.style.display = 'none';
document.body.appendChild(dragGhostEl);

function wirePlannedRowDrag(div, item) {
  let startX = 0, startY = 0, startTime = 0, dragging = false, lastX = 0, directionLocked = null;
  let rowNaturalHeight = 0, ghostOffsetX = 0, ghostOffsetY = 0, lastTapTime = 0;

  function pointFromEvent(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }
  function isOverCanvas(x, y) {
    const el = document.elementFromPoint(x, y);
    return !!(el && canvasWrap.contains(el));
  }

  function beginDrag(x, y) {
    dragging = true;
    lastTapTime = 0;
    const r = div.getBoundingClientRect();
    ghostOffsetX = x - r.left; ghostOffsetY = y - r.top;
    lastX = x;

    // Ghost shows exactly what the row currently shows
    dragGhostEl.innerHTML = '';
    const dot = document.createElement('div');
    dot.className = 'list-color-dot'; dot.style.background = item.color;
    const span = document.createElement('span');
    span.textContent = getItemName(item) + ' [plan]';
    dragGhostEl.appendChild(dot); dragGhostEl.appendChild(span);
    dragGhostEl.style.width = r.width + 'px';
    dragGhostEl.style.left = r.left + 'px';
    dragGhostEl.style.top  = r.top + 'px';
    dragGhostEl.style.transform = 'rotate(0deg)';
    dragGhostEl.classList.remove('over-canvas');
    dragGhostEl.style.display = 'flex';

    // Collapse the source row so the list closes the gap immediately, like
    // the item was physically lifted out of it
    rowNaturalHeight = div.offsetHeight;
    div.style.height = rowNaturalHeight + 'px';
    div.getBoundingClientRect(); // force a reflow so the pinned height registers first
    div.classList.add('collapsing');
    requestAnimationFrame(() => {
      div.style.height = '0px';
      div.style.paddingTop = '0px'; div.style.paddingBottom = '0px';
      div.style.borderBottomWidth = '0px';
      div.style.opacity = '0';
    });
  }

  function moveDrag(x, y) {
    const tiltDeg = Math.max(-16, Math.min(16, (x - lastX) * 1.4));
    lastX = x;
    dragGhostEl.style.left = (x - ghostOffsetX) + 'px';
    dragGhostEl.style.top  = (y - ghostOffsetY) + 'px';
    dragGhostEl.style.transform = `rotate(${tiltDeg}deg)`;
    dragGhostEl.classList.toggle('over-canvas', isOverCanvas(x, y));
  }

  function endDrag(x, y) {
    if (!dragging) { directionLocked = null; return; }
    dragging = false; directionLocked = null;
    dragGhostEl.style.display = 'none';

    if (isOverCanvas(x, y)) {
      const canvasRect = canvas.getBoundingClientRect();
      const scale = canvasRect.width / feetToPx(room.w);
      const wPx = inchesToPx(item.w_in), lPx = inchesToPx(item.l_in);
      const dropX = (x - canvasRect.left) / scale - wPx / 2;
      const dropY = (y - canvasRect.top)  / scale - lPx / 2;
      commitPlannedItem(item.id, dropX, dropY); // this re-renders the whole list, cleaning up the row
    } else {
      // Dropped outside the room — cancel, restore the row
      div.classList.remove('collapsing');
      div.style.height = rowNaturalHeight + 'px';
      div.getBoundingClientRect();
      requestAnimationFrame(() => {
        div.style.height = '';
        div.style.paddingTop = ''; div.style.paddingBottom = '';
        div.style.borderBottomWidth = ''; div.style.opacity = '';
      });
    }
  }

  // Mouse
  div.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    startX = e.clientX; startY = e.clientY; directionLocked = null;
    const onMove = e2 => {
      const p = pointFromEvent(e2);
      if (directionLocked === null) {
        const dx = p.x - startX, dy = p.y - startY;
        if (Math.abs(dx) > DRAG_ROW_THRESHOLD || Math.abs(dy) > DRAG_ROW_THRESHOLD) {
          directionLocked = Math.abs(dx) > Math.abs(dy) ? 'drag' : 'other';
          if (directionLocked === 'drag') beginDrag(startX, startY);
        }
      }
      if (dragging) moveDrag(p.x, p.y);
    };
    const onUp = e2 => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      const p = pointFromEvent(e2);
      endDrag(p.x, p.y);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  div.addEventListener('dblclick', () => openNameDialog(item.id));

  // Touch — mostly-horizontal movement drags the item out; mostly-vertical
  // movement is left alone so the list can still be scrolled normally.
  div.addEventListener('touchstart', e => {
    const p = pointFromEvent(e);
    startX = p.x; startY = p.y; startTime = Date.now(); directionLocked = null;
  }, { passive: true });
  div.addEventListener('touchmove', e => {
    const p = pointFromEvent(e);
    if (directionLocked === null) {
      const dx = p.x - startX, dy = p.y - startY;
      if (Math.abs(dx) > DRAG_ROW_THRESHOLD || Math.abs(dy) > DRAG_ROW_THRESHOLD) {
        directionLocked = Math.abs(dx) > Math.abs(dy) ? 'drag' : 'scroll';
        if (directionLocked === 'drag') beginDrag(startX, startY);
      }
    }
    if (directionLocked === 'drag') { e.preventDefault(); moveDrag(p.x, p.y); }
    // directionLocked === 'scroll' -> do nothing, let the browser scroll the list
  }, { passive: false });
  div.addEventListener('touchend', e => {
    const p = pointFromEvent(e);
    if (dragging) {
      e.preventDefault();
      endDrag(p.x, p.y);
    } else if (directionLocked === null && Date.now() - startTime < 500) {
      // A brief tap with no meaningful movement in either direction — check for double-tap
      e.preventDefault();
      const now = Date.now();
      if (lastTapTime > 0 && now - lastTapTime < 400) {
        lastTapTime = 0;
        openNameDialog(item.id);
      } else {
        lastTapTime = now;
      }
    }
  }, { passive: false });
  div.addEventListener('touchcancel', () => { lastTapTime = 0; endDrag(lastX, -1); }, { passive: true }); // -1 y is never over the canvas -> cancels
}

function renderItemList() {
  itemListEl.innerHTML = '';
  const tokens = getSearchTokens();
  const visibleItems = [...items]
    .sort((a, b) => getItemName(a).localeCompare(getItemName(b), undefined, { numeric: true, sensitivity: 'base' }))
    .filter(item => itemMatchesSearch(item, tokens));

  if (!visibleItems.length) {
    const msg = document.createElement('div');
    msg.className = 'list-empty-msg';
    msg.textContent = items.length ? 'No items match search.' : 'No items yet.';
    itemListEl.appendChild(msg);
    return;
  }

  visibleItems.forEach(item => {
    const div  = document.createElement('div');
    const isPlanned = !!item.planned;
    div.className = 'list-entry' +
                    (item.id === selectedId ? ' selected' : '') +
                    (isPlanned ? ' planned' : '');
    const dot  = document.createElement('div');
    dot.className = 'list-color-dot'; dot.style.background = item.color;
    const span = document.createElement('span');
    span.textContent = getItemName(item) + (isPlanned ? ' [plan]' : '');
    div.appendChild(dot); div.appendChild(span);

    if (!isPlanned) {
      // Normal items: click to select and scroll to in canvas
      div.addEventListener('click', () => {
        selectItem(item.id);
        document.getElementById('item-' + item.id)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
      });
    } else {
      // Planned items: drag out of the list and drop in the room to commit
      wirePlannedRowDrag(div, item);
    }

    itemListEl.appendChild(div);
  });
}

function selectItem(id) { selectedId = id; renderAllItems(); renderItemList(); }

canvas.addEventListener('click', e => {
  if (!e.target.classList.contains('room-item') && !e.target.classList.contains('hold-ring')) {
    selectedId = null; renderAllItems(); renderItemList();
  }
});

// ════════════════════════════════════════════════════
// Room set
// ════════════════════════════════════════════════════
document.getElementById('set-room-btn').addEventListener('click', () => {
  const rawW = parseFloat(document.getElementById('room-w').value) || (metricMode ? 3.7 : 12);
  const rawL = parseFloat(document.getElementById('room-l').value) || (metricMode ? 3   : 10);
  const rawH = parseFloat(document.getElementById('room-h').value) || (metricMode ? 2.4 : 8);
  room.w = metricMode ? mToFt(rawW) : rawW;
  room.l = metricMode ? mToFt(rawL) : rawL;
  room.h = metricMode ? mToFt(rawH) : rawH;
  applyRoomSize(); rebuildSlider();
  const unit = metricMode ? 'm' : 'ft';
  setStatus(`Room: ${round3(rawW)}${unit} x ${round3(rawL)}${unit} x ${round3(rawH)}${unit}`);
});

// ════════════════════════════════════════════════════
// Layer Collision
// ════════════════════════════════════════════════════
function toggleLayerCollision() {
  layerCollision = !layerCollision;
  document.getElementById('layer-collision-btn').classList.toggle('active', layerCollision);
  if (!layerCollision) {
    // Turning off: let everything fall/settle into its correct physical base
    // height now, in one pass — using actual current heights, not dragOrder.
    settleAllBaseHeights();
    rebuildSlider();
    renderAllItems();
    renderItemList();
  }
  setStatus(layerCollision ? 'Layer Collision ON — items keep their current layer.' : 'Layer Collision OFF — items settled to their correct layer.');
}
document.getElementById('layer-collision-btn').addEventListener('click', toggleLayerCollision);

// ════════════════════════════════════════════════════
// Save / Load
// ════════════════════════════════════════════════════
function buildSavePayload() {
  return JSON.stringify({ room, items, itemCounter, dragOrderCounter, layerFeet, planMode, metricMode, layerCollision, presets }, null, 2);
}

document.getElementById('save-btn').addEventListener('click', () => {
  const blob = new Blob([buildSavePayload()], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'room_inventory.json'; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 100);
  setStatus('Saved.');
});
document.getElementById('load-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { loadState(JSON.parse(ev.target.result)); setStatus('Loaded.'); }
    catch(err) { setStatus('Load error: ' + err.message); }
  };
  reader.readAsText(file); e.target.value = '';
});

// Sanitize a number from untrusted input: must be finite, within [min,max], fallback to def.
function safeNum(val, min, max, def) {
  const n = Number(val);
  if (!isFinite(n) || n < min || n > max) return def;
  return n;
}

// Validate an item ID from a loaded file: must match our known patterns or be rejected.
// Old IDs: 'i<digits>_<digits>', new IDs: 'item-id-<uuid>'
const SAFE_ID_RE = /^(i\d+_\d+|item-id-[0-9a-f-]{36})$/;
function safeId(val) {
  if (typeof val !== 'string') return null;
  return SAFE_ID_RE.test(val) ? val : null;
}

function loadState(state) {
  if (!state || typeof state !== 'object') { setStatus('Load error: invalid file.'); return; }

  // Validate and clamp room dimensions
  const rawRoom = state.room || {};
  const loadedRoom = {
    w: safeNum(rawRoom.w, 1, 200, 12),
    l: safeNum(rawRoom.l, 1, 200, 10),
    h: safeNum(rawRoom.h, 1, 50,   8),
  };

  const loadedItemCounter      = safeNum(state.itemCounter,      0, 1e9, 0);
  const loadedDragOrderCounter = safeNum(state.dragOrderCounter, 0, 1e9, 0);
  const loadedLayerFeet        = safeNum(state.layerFeet,        0, 1e6, loadedRoom.h);

  // Validate items array
  const rawItems = Array.isArray(state.items) ? state.items : [];
  if (rawItems.length > 500) { setStatus('Load error: too many items (max 500).'); return; }

  const validatedItems = [];
  for (const it of rawItems) {
    if (!it || typeof it !== 'object') continue;
    const id = safeId(it.id);
    if (!id) continue; // reject bad IDs
    validatedItems.push({
      id,
      serial:        safeNum(it.serial,        1, 1e9, validatedItems.length + 1),
      dragOrder:     safeNum(it.dragOrder !== undefined ? it.dragOrder : it.serial, 0, 1e9, validatedItems.length),
      w_in:          safeNum(it.w_in,           1, 1000, 12),
      l_in:          safeNum(it.l_in,           1, 1000, 12),
      h_in:          safeNum(it.h_in,           1, 1000, 12),
      x_px:          safeNum(it.x_px,           0, 1e6,  10),
      y_px:          safeNum(it.y_px,           0, 1e6,  10),
      baseHeight_in: safeNum(it.baseHeight_in,  0, 1e6,   0),
      // name: textContent-only, safe as-is but truncate to avoid absurd lengths
      name:          (typeof it.name === 'string' ? it.name : '').slice(0, 200),
      // color: only accept valid hsl() strings we generate, fallback to random
      color:         (typeof it.color === 'string' && /^hsl\(\d+,\d+%,\d+%\)$/.test(it.color))
                       ? it.color : randColor(),
      // planned: boolean only
      planned:       it.planned === true,
    });
  }

  // All validation passed — now commit to state
  items.forEach(it => document.getElementById('item-' + it.id)?.remove());
  items = []; undoStack = []; selectedId = null;

  room             = loadedRoom;
  itemCounter      = loadedItemCounter;
  dragOrderCounter = loadedDragOrderCounter;
  layerFeet        = loadedLayerFeet;

  // Restore planMode if saved
  if (typeof state.planMode === 'boolean' && state.planMode !== planMode) togglePlanMode();

  // Restore metricMode if saved. Set the flag directly (not via toggleUnits(),
  // which only fires on a change) so applyUnitMode() below always re-renders
  // the room fields correctly for whatever the current mode ends up being.
  if (typeof state.metricMode === 'boolean') metricMode = state.metricMode;
  document.getElementById('units-btn')?.classList.toggle('active', metricMode);
  document.getElementById('island-units')?.classList.toggle('active', metricMode);

  // Restore Layer Collision if saved (falls back to the old "floorCollision"
  // key so save files from before the rename still restore correctly)
  layerCollision = state.layerCollision === true || state.floorCollision === true;
  document.getElementById('layer-collision-btn')?.classList.toggle('active', layerCollision);

  // Restore presets if saved, validating each slot the same defensive way items are validated
  const rawPresets = Array.isArray(state.presets) ? state.presets.slice(0, 50) : [];
  presets = rawPresets.map(p => {
    if (p === null) return null;
    if (!p || typeof p !== 'object' || typeof p.name !== 'string') return null;
    return {
      name: p.name.slice(0, 2),
      w_in: safeNum(p.w_in, 1, 1000, 12),
      l_in: safeNum(p.l_in, 1, 1000, 12),
      h_in: safeNum(p.h_in, 1, 1000, 12),
    };
  });
  if (!presets.length) presets = [null, null, null];
  renderPresets();

  applyUnitMode(); // sets room-w/l/h labels, bounds, and values for the restored mode
  applyRoomSize();

  validatedItems.forEach(item => { items.push(item); createItemElement(item); });
  recomputeAllBaseHeights();

  // Search is ephemeral UI state — reset it on load, not part of saved data
  searchQuery = '';
  itemSearchEl.value = '';

  rebuildSlider();
  slider.value = Math.round(layerFeet * 2);
  renderAllItems(); renderItemList();
}

// ════════════════════════════════════════════════════
// sessionStorage crash-recovery snapshot
// Written whenever the tab goes to background (visibilitychange hidden).
// On load, if a snapshot exists it is offered for recovery.
// Key uses a hash of the page URL so multiple instances don't collide.
// ════════════════════════════════════════════════════
const SS_KEY = 'rimSnapshot_' + btoa(location.href).slice(0, 24);

function writeSnapshot() {
  try {
    sessionStorage.setItem(SS_KEY, buildSavePayload());
  } catch(e) { /* sessionStorage unavailable or full — silently ignore */ }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') writeSnapshot();
});

// Also snapshot every 60 seconds as a belt-and-suspenders measure
setInterval(writeSnapshot, 60_000);

function tryRecoverSnapshot() {
  let raw;
  try { raw = sessionStorage.getItem(SS_KEY); } catch(e) { return; }
  if (!raw) return;
  // Only offer recovery if there is actually something useful in the snapshot
  let parsed;
  try { parsed = JSON.parse(raw); } catch(e) { return; }
  if (!parsed || !Array.isArray(parsed.items) || parsed.items.length === 0) return;
  // Show a dismissible recovery banner
  const banner = document.createElement('div');
  banner.id = 'recovery-banner';
  banner.style.cssText = [
    'position:fixed','top:0','left:0','right:0','z-index:99999',
    'background:#4a3010','color:#ffd080','font-family:monospace','font-size:13px',
    'padding:10px 14px','display:flex','align-items:center','gap:12px',
    'border-bottom:2px solid #c87020'
  ].join(';');
  banner.innerHTML =
    '<span>&#9888; Unsaved session data recovered from before page reload.</span>' +
    '<button id="rec-restore" style="background:#c87020;border:none;color:#fff;padding:4px 10px;cursor:pointer;font-family:monospace;">Restore</button>' +
    '<button id="rec-discard" style="background:#383838;border:1px solid #666;color:#ccc;padding:4px 10px;cursor:pointer;font-family:monospace;">Discard</button>';
  document.body.prepend(banner);
  document.getElementById('rec-restore').addEventListener('click', () => {
    try { loadState(parsed); setStatus('Session recovered.'); } catch(e) { setStatus('Recovery failed: ' + e.message); }
    try { sessionStorage.removeItem(SS_KEY); } catch(e) {}
    banner.remove();
  });
  document.getElementById('rec-discard').addEventListener('click', () => {
    try { sessionStorage.removeItem(SS_KEY); } catch(e) {}
    banner.remove();
  });
}

// ════════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════════
applyRoomSize();
rebuildSlider();
layerFeet = room.h; slider.value = slider.max;
renderAllItems(); renderItemList(); renderPresets();
setStatus(isTouch() ? TOUCH_INSTRUCTIONS : DESKTOP_INSTRUCTIONS);

// Attempt session recovery
tryRecoverSnapshot();

// Register service worker (needed for PWA installability; no caching/offline
// behavior, see sw.js). Registration failing here is non-fatal -- the app
// still works, it just won't be installable as a PWA until this succeeds.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => console.warn('Service worker registration failed:', err));
}
</script>
</body>
</html>
